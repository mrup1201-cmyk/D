<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S6AKE FIX FINAL</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            background: #050510;
            font-family: 'Segoe UI', system-ui, Arial, sans-serif;
            overflow: hidden;
            color: #fff;
            touch-action: manipulation;
            height: 100dvh;
            width: 100vw;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #050510;
            z-index: 10;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        h1, h2 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        h1 {
            font-size: clamp(32px, 8vw, 56px);
            background: linear-gradient(135deg, #0ff, #a0f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: clamp(20px, 5vw, 28px);
            color: #ccc;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            background: #1a1a2e;
            color: #fff;
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 140px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.1);
        }

        button:active {
            transform: scale(0.95);
            background: #2a2a4e;
            box-shadow: 0 2px 8px rgba(0, 255, 255, 0.3);
        }

        #invList {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 50vh;
            overflow-y: auto;
            width: 100%;
            max-width: 280px;
        }

        #invList button {
            min-width: unset;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        #invList button:active {
            border-color: #fff;
        }

        #caseLog {
            min-height: 24px;
            font-size: 16px;
            color: #ffcc00;
            font-weight: 500;
        }

        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            z-index: 5;
            font-weight: 600;
            font-size: 16px;
        }

        canvas {
            display: none;
            background: #070712;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            font-size: 24px;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: manipulation;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: rgba(0, 255, 200, 0.5);
            border-color: #fff;
            transform: scale(0.9);
        }

        #gameOverScreen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            z-index: 15;
            text-align: center;
        }

        #gameOverScreen h2 {
            color: #ff5555;
            font-size: 28px;
        }

        #recordDisplay {
            color: #ffcc00;
            font-size: 18px;
        }

        @media (max-width: 600px) {
            .btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
                border-radius: 14px;
            }
            #controls {
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

<!-- Главное меню -->
<div id="menu" class="screen">
    <h1>S6AKE</h1>
    <button id="playBtn">▶ Играть</button>
    <button id="invBtn">🎒 Инвентарь</button>
    <button id="shopBtn">📦 Кейсы</button>
</div>

<!-- Инвентарь -->
<div id="inv" class="screen hidden">
    <h2>🎒 Инвентарь</h2>
    <div id="invList"></div>
    <button id="backFromInv">← Назад</button>
</div>

<!-- Магазин кейсов -->
<div id="shop" class="screen hidden">
    <h2>📦 Кейсы</h2>
    <button id="openCaseBtn">🔑 Открыть кейс (10 S6)</button>
    <div id="caseLog"></div>
    <button id="backFromShop">← Назад</button>
</div>

<!-- Экран окончания игры -->
<div id="gameOverScreen" class="screen hidden">
    <h2>💀 Игра окончена</h2>
    <p>Ваш счёт: <span id="finalScore">0</span></p>
    <p id="recordDisplay">🏆 Рекорд: 0</p>
    <button id="restartBtn">🔄 Играть снова</button>
    <button id="toMenuBtn">🏠 В меню</button>
</div>

<!-- HUD -->
<div id="hud">
    <div>⟡ S6: <span id="money">0</span></div>
    <div>🍎 Счёт: <span id="score">0</span></div>
</div>

<!-- Джойстик -->
<div id="controls">
    <div class="row">
        <button class="btn" data-dir="up">↑</button>
    </div>
    <div class="row">
        <button class="btn" data-dir="left">←</button>
        <button class="btn" data-dir="down">↓</button>
        <button class="btn" data-dir="right">→</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    (function() {
        /* =========================
           DOM элементы
        ========================= */
        const menu = document.getElementById('menu');
        const invScreen = document.getElementById('inv');
        const shopScreen = document.getElementById('shop');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const controls = document.getElementById('controls');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const moneySpan = document.getElementById('money');
        const scoreSpan = document.getElementById('score');
        const invListDiv = document.getElementById('invList');
        const caseLog = document.getElementById('caseLog');
        const finalScoreSpan = document.getElementById('finalScore');
        const recordDisplay = document.getElementById('recordDisplay');

        /* =========================
           Данные игры
        ========================= */
        let state = 'menu'; // 'menu' | 'game' | 'gameover'
        let money = Number(localStorage.getItem('money') || 50);
        let inventory = JSON.parse(localStorage.getItem('inv') || '[]');
        let record = Number(localStorage.getItem('record') || 0);

        // Базовые скины
        const baseSkins = [
            { id: 'basic', name: '🐍 Basic', color: '#0ff' },
            { id: 'rare', name: '💎 Rare', color: '#4df' },
            { id: 'epic', name: '✨ Epic', color: '#a0f' },
            { id: 'legend', name: '👑 Legend', color: '#ffcc00' }
        ];

        // Если инвентарь пуст — добавляем все базовые скины
        if (inventory.length === 0) {
            inventory = baseSkins.map(s => ({ ...s }));
            localStorage.setItem('inv', JSON.stringify(inventory));
        }

        // Экипированный скин
        let equipped = localStorage.getItem('equip') || 'basic';

        /* =========================
           Игровые переменные
        ========================= */
        let snake, food;
        let dx = 20, dy = 0;
        let nextDx = 20, nextDy = 0; // буфер направления, чтобы избежать разворота на 180 за кадр
        let lastTimestamp = 0;
        const SPEED = 100; // мс на кадр
        let score = 0;
        let animationFrameId = null;

        /* =========================
           Ресайз канваса
        ========================= */
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (state === 'game') draw();
        });
        resizeCanvas();

        /* =========================
           Навигация
        ========================= */
        function showScreen(screen) {
            menu.classList.add('hidden');
            invScreen.classList.add('hidden');
            shopScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            canvas.style.display = 'none';
            hud.style.display = 'none';
            controls.style.display = 'none';

            if (screen === 'menu') {
                menu.classList.remove('hidden');
                state = 'menu';
            } else if (screen === 'inv') {
                invScreen.classList.remove('hidden');
                renderInventory();
                state = 'menu';
            } else if (screen === 'shop') {
                shopScreen.classList.remove('hidden');
                state = 'menu';
            } else if (screen === 'gameover') {
                gameOverScreen.classList.remove('hidden');
                state = 'gameover';
                canvas.style.display = 'block';
                draw(); // показать застывшую змейку
            }
        }

        function backToMenu() {
            stopGameLoop();
            showScreen('menu');
        }

        /* =========================
           Инвентарь
        ========================= */
        function renderInventory() {
            invListDiv.innerHTML = '';
            if (inventory.length === 0) {
                invListDiv.innerHTML = '<p style="color:#888">Инвентарь пуст</p>';
                return;
            }
            inventory.forEach(skin => {
                const btn = document.createElement('button');
                const isEquipped = equipped === skin.id;
                btn.innerText = (isEquipped ? '✅ ' : '') + skin.name;
                btn.style.background = skin.color;
                btn.style.color = '#000';
                btn.addEventListener('click', () => {
                    equipped = skin.id;
                    localStorage.setItem('equip', equipped);
                    renderInventory();
                });
                invListDiv.appendChild(btn);
            });
        }

        /* =========================
           Кейсы
        ========================= */
        function openCase() {
            if (money < 10) {
                caseLog.innerText = '❌ Недостаточно S6';
                caseLog.style.color = '#ff5555';
                return;
            }
            money -= 10;

            // Шанс 40% получить бонусные монеты
            if (Math.random() < 0.4) {
                const bonus = Math.floor(Math.random() * 30) + 10;
                money += bonus;
                caseLog.innerText = `💰 Вы выиграли +${bonus} S6!`;
                caseLog.style.color = '#ffcc00';
            } else {
                // Дропаем случайный скин из полного списка (даже те, которых нет в инвентаре)
                const randomSkin = baseSkins[Math.floor(Math.random() * baseSkins.length)];
                // Проверяем, есть ли уже такой скин
                const exists = inventory.some(s => s.id === randomSkin.id);
                if (!exists) {
                    inventory.push({ ...randomSkin });
                    caseLog.innerText = `🎉 Новый скин: ${randomSkin.name}!`;
                    caseLog.style.color = '#a0f';
                } else {
                    // Если уже есть — даём утешительные монеты
                    const consolation = Math.floor(Math.random() * 15) + 5;
                    money += consolation;
                    caseLog.innerText = `🔄 Скин уже есть. +${consolation} S6`;
                    caseLog.style.color = '#cccccc';
                }
            }

            saveData();
            updateHUD();
            if (state === 'menu' && shopScreen.classList.contains('hidden') === false) {
                // Обновляем инвентарь если открыт
            }
        }

        /* =========================
           Сохранение
        ========================= */
        function saveData() {
            localStorage.setItem('money', money);
            localStorage.setItem('inv', JSON.stringify(inventory));
            localStorage.setItem('equip', equipped);
            if (record > Number(localStorage.getItem('record') || 0)) {
                localStorage.setItem('record', record);
            }
        }

        function updateHUD() {
            moneySpan.innerText = money;
            scoreSpan.innerText = score;
        }

        /* =========================
           Игровая логика
        ========================= */
        function spawnFood() {
            const cols = Math.floor(canvas.width / 20);
            const rows = Math.floor(canvas.height / 20);
            let pos;
            let attempts = 0;
            const maxAttempts = cols * rows;
            do {
                pos = {
                    x: Math.floor(Math.random() * cols) * 20,
                    y: Math.floor(Math.random() * rows) * 20
                };
                attempts++;
                if (attempts > maxAttempts) break; // всё поле занято
            } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
            return pos;
        }

        function resetGame() {
            snake = [{ x: Math.floor(canvas.width / 2 / 20) * 20, y: Math.floor(canvas.height / 2 / 20) * 20 }];
            food = spawnFood();
            dx = 20;
            dy = 0;
            nextDx = 20;
            nextDy = 0;
            score = 0;
            updateHUD();
        }

        function startGame() {
            stopGameLoop();
            resetGame();
            state = 'game';
            menu.classList.add('hidden');
            invScreen.classList.add('hidden');
            shopScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            canvas.style.display = 'block';
            hud.style.display = 'flex';
            controls.style.display = 'flex';
            updateHUD();
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function stopGameLoop() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function gameOver() {
            stopGameLoop();
            state = 'gameover';
            if (score > record) {
                record = score;
            }
            saveData();
            finalScoreSpan.innerText = score;
            recordDisplay.innerText = '🏆 Рекорд: ' + record;
            showScreen('gameover');
        }

        function gameLoop(timestamp) {
            if (state !== 'game') return;

            if (timestamp - lastTimestamp >= SPEED) {
                lastTimestamp = timestamp;

                // Применяем буферизованное направление
                dx = nextDx;
                dy = nextDy;

                const head = snake[0];
                const newHead = { x: head.x + dx, y: head.y + dy };

                // Проверка столкновения со стенами
                if (newHead.x < 0 || newHead.x >= canvas.width || newHead.y < 0 || newHead.y >= canvas.height) {
                    gameOver();
                    return;
                }

                // Проверка столкновения с собой
                if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
                    gameOver();
                    return;
                }

                snake.unshift(newHead);

                // Поедание еды
                if (newHead.x === food.x && newHead.y === food.y) {
                    score++;
                    money++;
                    food = spawnFood();
                    updateHUD();
                } else {
                    snake.pop();
                }

                draw();
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Еда
            ctx.fillStyle = '#ff4d6a';
            ctx.shadowColor = '#ff4d6a';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(food.x + 10, food.y + 10, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Змейка
            const skin = inventory.find(s => s.id === equipped) || baseSkins[0];
            ctx.fillStyle = skin.color;
            ctx.shadowColor = skin.color;
            ctx.shadowBlur = 6;

            snake.forEach((seg, i) => {
                const size = i === 0 ? 19 : 17;
                const offset = (20 - size) / 2;
                ctx.beginPath();
                ctx.roundRect(seg.x + offset, seg.y + offset, size, size, 5);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        /* =========================
           Управление
        ========================= */
        function setDirection(dir) {
            if (state !== 'game') return;
            switch (dir) {
                case 'up':
                    if (dy === 0) { nextDx = 0;
                        nextDy = -20; }
                    break;
                case 'down':
                    if (dy === 0) { nextDx = 0;
                        nextDy = 20; }
                    break;
                case 'left':
                    if (dx === 0) { nextDx = -20;
                        nextDy = 0; }
                    break;
                case 'right':
                    if (dx === 0) { nextDx = 20;
                        nextDy = 0; }
                    break;
            }
        }

        // Кнопки джойстика
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const dir = btn.getAttribute('data-dir');
                if (dir) setDirection(dir);
            });
            // Предотвращаем стандартное поведение и всплытие
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dir = btn.getAttribute('data-dir');
                if (dir) setDirection(dir);
            });
        });

        // Клавиатура
        window.addEventListener('keydown', (e) => {
            if (state !== 'game') return;
            const key = e.key.toLowerCase();
            if (key === 'arrowup' || key === 'w') { e.preventDefault();
                setDirection('up'); } else if (key === 'arrowdown' || key === 's') { e.preventDefault();
                setDirection('down'); } else if (key === 'arrowleft' || key === 'a') { e.preventDefault();
                setDirection('left'); } else if (key === 'arrowright' || key === 'd') { e.preventDefault();
                setDirection('right'); }
        });

        /* =========================
           Обработчики кнопок меню
        ========================= */
        document.getElementById('playBtn').addEventListener('click', startGame);
        document.getElementById('invBtn').addEventListener('click', () => showScreen('inv'));
        document.getElementById('shopBtn').addEventListener('click', () => showScreen('shop'));
        document.getElementById('backFromInv').addEventListener('click', backToMenu);
        document.getElementById('backFromShop').addEventListener('click', backToMenu);
        document.getElementById('openCaseBtn').addEventListener('click', openCase);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('toMenuBtn').addEventListener('click', backToMenu);

        /* =========================
           Инициализация
        ========================= */
        updateHUD();
        showScreen('menu');

        // Поддержка roundRect для старых браузеров
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                ctx.beginPath();
                ctx.moveTo(x + r.tl, y);
                ctx.lineTo(x + w - r.tr, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                ctx.lineTo(x + w, y + h - r.br);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                ctx.lineTo(x + r.bl, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                ctx.lineTo(x, y + r.tl);
                ctx.quadraticCurveTo(x, y, x + r.tl, y);
                ctx.closePath();
            };
        }
    })();
</script>
</body>
</html>
