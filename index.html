<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>СИНТЕЗИЯ · ЗМЕЙКА X</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Segoe UI', 'Share Tech Mono', 'Courier New', monospace;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            transition: background 0.2s, color 0.1s;
        }

        /* динамические темы */
        body.skin-basic {
            --accent: #0ff;
            --accent-glow: #0ff;
            --accent-bg: rgba(0, 255, 255, 0.12);
            --panel-bg: rgba(0, 20, 30, 0.75);
        }
        body.skin-rare {
            --accent: #3c9eff;
            --accent-glow: #3c9eff;
            --accent-bg: rgba(60, 158, 255, 0.15);
            --panel-bg: rgba(10, 25, 45, 0.8);
        }
        body.skin-epic {
            --accent: #bc6ff9;
            --accent-glow: #bc6ff9;
            --accent-bg: rgba(188, 111, 249, 0.2);
            --panel-bg: rgba(25, 10, 40, 0.8);
        }
        body.skin-legend {
            --accent: #ffb347;
            --accent-glow: #ffaa33;
            --accent-bg: rgba(255, 180, 71, 0.2);
            --panel-bg: rgba(40, 25, 5, 0.85);
        }

        .pixel-font {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            letter-spacing: 1px;
        }

        /* общие экраны */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            background: radial-gradient(circle at center, rgba(0,0,0,0.65), #03050b);
            backdrop-filter: blur(12px);
            z-index: 20;
            padding: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px var(--accent-glow);
            letter-spacing: 6px;
        }

        h2 {
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
        }

        button {
            padding: 12px 28px;
            background: rgba(10, 20, 30, 0.7);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Share Tech Mono', monospace;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            min-width: 180px;
        }

        button:active {
            transform: scale(0.96);
            background: var(--accent);
            color: #000;
            border-color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* инвентарь сетка */
        #invList {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-height: 55vh;
            overflow-y: auto;
            padding: 6px;
            width: 100%;
            max-width: 500px;
        }

        .skin-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            min-width: 140px;
            transition: 0.1s;
        }

        .skin-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        .skin-equip {
            background: transparent;
            border: 1px solid var(--accent);
            padding: 6px 14px;
            min-width: auto;
            font-size: 0.8rem;
            box-shadow: none;
        }

        .skin-equip.active-skin {
            background: var(--accent);
            color: #000;
            border-color: white;
        }

        /* логи кейсов */
        .case-animation {
            font-family: monospace;
            background: #0a0a1a;
            padding: 12px 20px;
            border-radius: 28px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(18px);
            padding: 12px 20px;
            border-radius: 48px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
            z-index: 25;
            font-weight: bold;
            font-size: 1.1rem;
            font-family: monospace;
        }

        /* джойстик */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 25;
        }

        .row {
            display: flex;
            gap: 18px;
            justify-content: center;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            box-shadow: 0 0 18px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .ctrl-btn:active {
            background: var(--accent);
            color: black;
            transform: scale(0.9);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            display: none;
            z-index: 1;
            image-rendering: crisp-edges;
        }

        /* настройки */
        .setting-row {
            width: 280px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 50px;
            border-left: 3px solid var(--accent);
        }

        .toggle-group {
            display: flex;
            gap: 8px;
            background: #11151f;
            border-radius: 60px;
            padding: 4px;
        }

        .toggle-btn {
            padding: 6px 16px;
            min-width: auto;
            border-radius: 60px;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 0.75rem;
            box-shadow: none;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: black;
        }
    </style>
</head>
<body>

<!-- МЕНЮ -->
<div id="menu" class="screen">
    <h1>NEO SNAKE</h1>
    <button id="playBtn">▶ СТАРТ</button>
    <button id="invBtn">📦 ИНВЕНТАРЬ</button>
    <button id="shopBtn">🌀 КЕЙСЫ</button>
    <button id="settingsBtn">⚙️ НАСТРОЙКИ</button>
</div>

<!-- ИНВЕНТАРЬ -->
<div id="inv" class="screen hidden">
    <h2>ИНВЕНТАРЬ</h2>
    <div id="invList"></div>
    <button id="backFromInv">← НАЗАД</button>
</div>

<!-- КЕЙСЫ -->
<div id="shop" class="screen hidden">
    <h2>КИБЕР КЕЙСЫ</h2>
    <button id="openCaseBtn">🔓 ОТКРЫТЬ (10 S6)</button>
    <div id="caseLog" class="case-animation">⚡ ГОТОВ К РАЗБЛОКИРОВКЕ</div>
    <button id="backFromShop">← НАЗАД</button>
</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="screen hidden">
    <h2>СИСТЕМА</h2>
    <div class="setting-row">
        <span>⚡ СКОРОСТЬ</span>
        <div class="toggle-group" id="speedGroup">
            <button class="toggle-btn" data-speed="0.7">МЕДЛ</button>
            <button class="toggle-btn active" data-speed="1.0">НОРМ</button>
            <button class="toggle-btn" data-speed="1.4">БЫСТР</button>
        </div>
    </div>
    <div class="setting-row">
        <span>🎮 ДЖОЙСТИК</span>
        <div class="toggle-group" id="joystickGroup">
            <button class="toggle-btn active" data-joystick="on">ВКЛ</button>
            <button class="toggle-btn" data-joystick="off">ВЫКЛ</button>
        </div>
    </div>
    <div class="setting-row">
        <span>📳 ВИБРО</span>
        <div class="toggle-group" id="vibroGroup">
            <button class="toggle-btn active" data-vibro="on">ВКЛ</button>
            <button class="toggle-btn" data-vibro="off">ВЫКЛ</button>
        </div>
    </div>
    <div class="setting-row">
        <span>🖥️ FPS</span>
        <div class="toggle-group" id="fpsGroup">
            <button class="toggle-btn" data-fps="15">15</button>
            <button class="toggle-btn" data-fps="30">30</button>
            <button class="toggle-btn active" data-fps="60">60</button>
        </div>
    </div>
    <button id="backFromSettings">← НАЗАД</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen hidden">
    <h2 style="color:#ff5e6e;">СБОЙ СИСТЕМЫ</h2>
    <p class="pixel-font" style="font-size: 1.4rem;">ОЧКИ: <span id="finalScore">0</span></p>
    <p class="pixel-font" id="recordDisplay">🏆 РЕКОРД: 0</p>
    <button id="restartBtn">⟳ РЕСТАРТ</button>
    <button id="toMenuBtn">🏠 МЕНЮ</button>
</div>

<div id="hud">
    <div>S6: <span id="money">0</span></div>
    <div>🍎 <span id="score">0</span></div>
</div>

<div id="controls">
    <div class="row"><button class="ctrl-btn" data-dir="up" id="btnUp">▲</button></div>
    <div class="row">
        <button class="ctrl-btn" data-dir="left" id="btnLeft">◀</button>
        <button class="ctrl-btn" data-dir="down" id="btnDown">▼</button>
        <button class="ctrl-btn" data-dir="right" id="btnRight">▶</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    (function() {
        // --- ЭЛЕМЕНТЫ ---
        const menu = document.getElementById('menu');
        const invScreen = document.getElementById('inv');
        const shopScreen = document.getElementById('shop');
        const settingsScreen = document.getElementById('settings');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const controlsDiv = document.getElementById('controls');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const moneySpan = document.getElementById('money');
        const scoreSpan = document.getElementById('score');
        const invListDiv = document.getElementById('invList');
        const caseLog = document.getElementById('caseLog');
        const finalScoreSpan = document.getElementById('finalScore');
        const recordDisplay = document.getElementById('recordDisplay');

        // --- ДАННЫЕ ИГРОКА ---
        let money = Number(localStorage.getItem('money') || 80);
        let inventory = JSON.parse(localStorage.getItem('inv') || '[]');
        let record = Number(localStorage.getItem('record') || 0);
        let equipped = localStorage.getItem('equip') || 'basic';

        // СКИНЫ (без эмодзи)
        const skinCatalog = [
            { id: 'basic', name: 'BASIC', color: '#0ff', glow: '#0ff', symbolUp: '▲', symbolDown: '▼', symbolLeft: '◀', symbolRight: '▶' },
            { id: 'rare', name: 'RARE', color: '#3c9eff', glow: '#3c9eff', symbolUp: '⇧', symbolDown: '⇩', symbolLeft: '⇦', symbolRight: '⇨' },
            { id: 'epic', name: 'EPIC', color: '#bc6ff9', glow: '#bc6ff9', symbolUp: '⬆', symbolDown: '⬇', symbolLeft: '⬅', symbolRight: '➡' },
            { id: 'legend', name: 'LEGEND', color: '#ffb347', glow: '#ffb347', symbolUp: '⌃', symbolDown: '⌄', symbolLeft: '〈', symbolRight: '〉' }
        ];

        if (!inventory.length) {
            inventory = skinCatalog.map(s => ({ ...s }));
            localStorage.setItem('inv', JSON.stringify(inventory));
        }

        // НАСТРОЙКИ
        let settings = {
            speed: 1.0,
            joystick: true,
            vibration: true,
            fps: 60
        };
        const savedSets = localStorage.getItem('s6settings');
        if (savedSets) settings = { ...settings, ...JSON.parse(savedSets) };
        function persistSettings() { localStorage.setItem('s6settings', JSON.stringify(settings)); }

        // --- ПРИМЕНЕНИЕ СКИНА (тело, кнопки, переменные)---
        function applySkin(skinId) {
            const skin = inventory.find(s => s.id === skinId) || skinCatalog[0];
            document.body.className = `skin-${skin.id}`;
            document.documentElement.style.setProperty('--accent', skin.color);
            document.documentElement.style.setProperty('--accent-glow', skin.glow);
            // обновить символы на джойстике
            const up = document.getElementById('btnUp');
            const down = document.getElementById('btnDown');
            const left = document.getElementById('btnLeft');
            const right = document.getElementById('btnRight');
            if (up) up.innerText = skin.symbolUp;
            if (down) down.innerText = skin.symbolDown;
            if (left) left.innerText = skin.symbolLeft;
            if (right) right.innerText = skin.symbolRight;
        }

        // --- ИНВЕНТАРЬ ОТРИСОВКА ---
        function renderInventory() {
            invListDiv.innerHTML = '';
            inventory.forEach(skin => {
                const card = document.createElement('div');
                card.className = 'skin-card';
                const nameSpan = document.createElement('div');
                nameSpan.className = 'skin-name';
                nameSpan.innerText = skin.name;
                nameSpan.style.textShadow = `0 0 6px ${skin.glow}`;
                const equipBtn = document.createElement('button');
                equipBtn.innerText = (equipped === skin.id) ? '✓ ЭКИПИРОВАН' : 'НАДЕТЬ';
                equipBtn.className = 'skin-equip';
                if (equipped === skin.id) equipBtn.classList.add('active-skin');
                equipBtn.style.borderColor = skin.glow;
                equipBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    equipped = skin.id;
                    localStorage.setItem('equip', equipped);
                    applySkin(equipped);
                    renderInventory();   // обновить активное состояние
                });
                card.appendChild(nameSpan);
                card.appendChild(equipBtn);
                invListDiv.appendChild(card);
            });
        }

        // Обновление инвентаря, если экран открыт
        let invScreenVisible = false;
        function refreshInventoryIfVisible() {
            if (invScreenVisible) renderInventory();
        }

        // --- СОХРАНЕНИЕ ДАННЫХ ---
        function saveFull() {
            localStorage.setItem('money', money);
            localStorage.setItem('inv', JSON.stringify(inventory));
            localStorage.setItem('equip', equipped);
            if (score > record) {
                record = score;
                localStorage.setItem('record', record);
            }
        }

        function updateUI() {
            moneySpan.innerText = money;
            scoreSpan.innerText = score;
        }

        // --- КЕЙСЫ С КРУТОЙ АНИМАЦИЕЙ ---
        function animateCaseText(message, color) {
            caseLog.style.color = color;
            caseLog.innerText = message;
            setTimeout(() => {
                if (caseLog.innerText === message) caseLog.innerText = '⚡ ГОТОВ К РАЗБЛОКИРОВКЕ';
            }, 1600);
        }

        function openCase() {
            if (money < 10) {
                animateCaseText('❌ НЕДОСТАТОЧНО S6', '#ff7777');
                return;
            }
            money -= 10;
            updateUI();
            caseLog.style.color = '#0ff';
            caseLog.innerText = '⟳ РАЗБЛОКИРОВКА...';
            setTimeout(() => {
                const isSkinDrop = Math.random() < 0.48;
                if (!isSkinDrop) {
                    const bonus = Math.floor(Math.random() * 25) + 10;
                    money += bonus;
                    animateCaseText(`💰 ПОЛУЧЕНО +${bonus} S6`, '#ffcc44');
                    if (settings.vibration) navigator.vibrate?.(20);
                } else {
                    const newSkin = skinCatalog[Math.floor(Math.random() * skinCatalog.length)];
                    const alreadyOwn = inventory.some(s => s.id === newSkin.id);
                    if (!alreadyOwn) {
                        inventory.push({ ...newSkin });
                        animateCaseText(`🎁 НОВЫЙ СКИН: ${newSkin.name}`, newSkin.glow);
                        refreshInventoryIfVisible();
                    } else {
                        const comp = Math.floor(Math.random() * 18) + 8;
                        money += comp;
                        animateCaseText(`🔄 ПОВТОР. +${comp} S6`, '#bbbbff');
                    }
                }
                saveFull();
                updateUI();
                if (settings.vibration) navigator.vibrate?.(25);
            }, 260);
        }

        // --- ИГРОВАЯ ЛОГИКА (ЗМЕЙКА) ---
        let snake = [], food = {x:0,y:0};
        let dx = 20, dy = 0, nextDx = 20, nextDy = 0;
        let score = 0;
        let gameLoopId = null;
        let lastRender = 0;
        let gameSpeed = 100; // будет пересчитано
        let state = 'menu';
        let gameActive = false;

        function calcGameSpeed() {
            const fpsInterval = 1000 / settings.fps;
            return fpsInterval / settings.speed;
        }

        function resizeCanvasAndGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnValidFood() {
            const cols = Math.max(1, Math.floor(canvas.width / 20));
            const rows = Math.max(1, Math.floor(canvas.height / 20));
            let freePos = null;
            for (let i = 0; i < 3000; i++) {
                const cand = {
                    x: Math.floor(Math.random() * cols) * 20,
                    y: Math.floor(Math.random() * rows) * 20
                };
                if (!snake.some(seg => seg.x === cand.x && seg.y === cand.y)) {
                    freePos = cand;
                    break;
                }
            }
            if (!freePos) {
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const cand = { x: x * 20, y: y * 20 };
                        if (!snake.some(seg => seg.x === cand.x && seg.y === cand.y)) {
                            freePos = cand;
                            break;
                        }
                    }
                    if (freePos) break;
                }
            }
            return freePos || { x: 100, y: 100 };
        }

        function resetGameState() {
            const cols = Math.max(5, Math.floor(canvas.width / 20));
            const rows = Math.max(5, Math.floor(canvas.height / 20));
            const startX = Math.floor(cols / 2) * 20;
            const startY = Math.floor(rows / 2) * 20;
            snake = [{ x: startX, y: startY }];
            dx = 20; dy = 0;
            nextDx = 20; nextDy = 0;
            score = 0;
            updateUI();
            food = spawnValidFood();
            gameSpeed = calcGameSpeed();
        }

        function drawSnakeSegment(x, y, isHead, angleHint) {
            const gradient = ctx.createRadialGradient(x+6, y+6, 3, x+10, y+10, 12);
            const skin = inventory.find(s => s.id === equipped) || skinCatalog[0];
            gradient.addColorStop(0, skin.color);
            gradient.addColorStop(1, '#ffffff80');
            ctx.beginPath();
            ctx.arc(x+10, y+10, 9, 0, Math.PI*2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowBlur = 12;
            ctx.shadowColor = skin.glow;
            ctx.fill();
            if (isHead) {
                ctx.beginPath();
                ctx.arc(x+6, y+6, 3, 0, Math.PI*2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x+14, y+6, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(x+5, y+5, 1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x+13, y+5, 1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffcc88';
                ctx.beginPath();
                ctx.ellipse(x+10, y+15, 4, 2, 0, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function draw() {
            if (!canvas.width || !canvas.height) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // ЕДА (сияющая)
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ff5588';
            ctx.beginPath();
            ctx.arc(food.x+10, food.y+10, 9, 0, Math.PI*2);
            ctx.fillStyle = '#ff3a6f';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(food.x+7, food.y+7, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            for (let i=0; i<snake.length; i++) {
                const seg = snake[i];
                drawSnakeSegment(seg.x, seg.y, i===0);
            }
        }

        function stepGame() {
            if (!gameActive) return;
            dx = nextDx;
            dy = nextDy;
            const head = snake[0];
            const newHead = { x: head.x + dx, y: head.y + dy };
            // границы
            if (newHead.x < 0 || newHead.x >= canvas.width || newHead.y < 0 || newHead.y >= canvas.height) {
                triggerGameOver();
                return;
            }
            // столкновение с собой
            if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
                triggerGameOver();
                return;
            }
            snake.unshift(newHead);
            if (newHead.x === food.x && newHead.y === food.y) {
                score++;
                money++;
                updateUI();
                if (settings.vibration) navigator.vibrate?.(12);
                food = spawnValidFood();
            } else {
                snake.pop();
            }
            draw();
        }

        function triggerGameOver() {
            if (!gameActive) return;
            gameActive = false;
            state = 'gameover';
            if (score > record) record = score;
            saveFull();
            finalScoreSpan.innerText = score;
            recordDisplay.innerText = `🏆 РЕКОРД: ${record}`;
            showScreen('gameover');
            if (settings.vibration) navigator.vibrate?.([30,60,30]);
            stopGameLoop();
        }

        function gameLoop(now) {
            if (!gameActive || state !== 'game') return;
            if (now - lastRender >= gameSpeed) {
                lastRender = now;
                stepGame();
            }
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startGameLoop() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameActive = true;
            lastRender = performance.now();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function stopGameLoop() {
            if (gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            gameActive = false;
        }

        function startGame() {
            stopGameLoop();
            resizeCanvasAndGrid();
            resetGameState();
            state = 'game';
            gameActive = true;
            canvas.style.display = 'block';
            hud.style.display = 'flex';
            controlsDiv.style.display = settings.joystick ? 'flex' : 'none';
            applySkin(equipped);
            updateUI();
            draw();
            startGameLoop();
            // скрыть все экраны
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        }

        function showScreen(name) {
            stopGameLoop();
            state = name;
            canvas.style.display = 'none';
            hud.style.display = 'none';
            controlsDiv.style.display = 'none';
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            if (name === 'menu') menu.classList.remove('hidden');
            else if (name === 'inv') { invScreen.classList.remove('hidden'); invScreenVisible = true; renderInventory(); }
            else if (name === 'shop') shopScreen.classList.remove('hidden');
            else if (name === 'settings') settingsScreen.classList.remove('hidden');
            else if (name === 'gameover') gameOverScreen.classList.remove('hidden');
        }

        function backToMenu() {
            showScreen('menu');
            invScreenVisible = false;
        }

        // --- УПРАВЛЕНИЕ ---
        function setDirection(dir) {
            if (!gameActive) return;
            switch(dir) {
                case 'up': if (dy === 0) { nextDx = 0; nextDy = -20; } break;
                case 'down': if (dy === 0) { nextDx = 0; nextDy = 20; } break;
                case 'left': if (dx === 0) { nextDx = -20; nextDy = 0; } break;
                case 'right': if (dx === 0) { nextDx = 20; nextDy = 0; } break;
            }
        }

        // события джойстика
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => { e.preventDefault(); setDirection(btn.dataset.dir); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(btn.dataset.dir); });
        });
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const k = e.key;
            if (k === 'ArrowUp' || k === 'w') setDirection('up');
            else if (k === 'ArrowDown' || k === 's') setDirection('down');
            else if (k === 'ArrowLeft' || k === 'a') setDirection('left');
            else if (k === 'ArrowRight' || k === 'd') setDirection('right');
        });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); });
        let touchStart = null;
        canvas.addEventListener('touchstart', (e) => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
        canvas.addEventListener('touchend', (e) => {
            if (!touchStart || !gameActive) return;
            const dxS = e.changedTouches[0].clientX - touchStart.x;
            const dyS = e.changedTouches[0].clientY - touchStart.y;
            if (Math.abs(dxS) < 20 && Math.abs(dyS) < 20) return;
            if (Math.abs(dxS) > Math.abs(dyS)) setDirection(dxS > 0 ? 'right' : 'left');
            else setDirection(dyS > 0 ? 'down' : 'up');
            touchStart = null;
        });

        // НАСТРОЙКИ UI
        function updateSettingsUI() {
            document.querySelectorAll('#speedGroup .toggle-btn').forEach(btn => btn.classList.toggle('active', parseFloat(btn.dataset.speed) === settings.speed));
            document.querySelectorAll('#joystickGroup .toggle-btn').forEach(btn => btn.classList.toggle('active', (btn.dataset.joystick === 'on') === settings.joystick));
            document.querySelectorAll('#vibroGroup .toggle-btn').forEach(btn => btn.classList.toggle('active', (btn.dataset.vibro === 'on') === settings.vibration));
            document.querySelectorAll('#fpsGroup .toggle-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.fps) === settings.fps));
        }
        document.getElementById('speedGroup').addEventListener('click', (e) => { if(e.target.dataset.speed){ settings.speed = parseFloat(e.target.dataset.speed); persistSettings(); updateSettingsUI(); if(state==='game') gameSpeed = calcGameSpeed(); } });
        document.getElementById('joystickGroup').addEventListener('click', (e) => { if(e.target.dataset.joystick){ settings.joystick = e.target.dataset.joystick === 'on'; persistSettings(); updateSettingsUI(); if(state==='game') controlsDiv.style.display = settings.joystick ? 'flex' : 'none'; } });
        document.getElementById('vibroGroup').addEventListener('click', (e) => { if(e.target.dataset.vibro){ settings.vibration = e.target.dataset.vibro === 'on'; persistSettings(); updateSettingsUI(); } });
        document.getElementById('fpsGroup').addEventListener('click', (e) => { if(e.target.dataset.fps){ settings.fps = parseInt(e.target.dataset.fps); persistSettings(); updateSettingsUI(); if(state==='game') gameSpeed = calcGameSpeed(); } });

        // КНОПКИ НАВИГАЦИИ
        document.getElementById('playBtn').addEventListener('click', startGame);
        document.getElementById('invBtn').addEventListener('click', () => showScreen('inv'));
        document.getElementById('shopBtn').addEventListener('click', () => showScreen('shop'));
        document.getElementById('settingsBtn').addEventListener('click', () => showScreen('settings'));
        document.getElementById('backFromInv').addEventListener('click', backToMenu);
        document.getElementById('backFromShop').addEventListener('click', backToMenu);
        document.getElementById('backFromSettings').addEventListener('click', backToMenu);
        document.getElementById('openCaseBtn').addEventListener('click', openCase);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('toMenuBtn').addEventListener('click', backToMenu);

        window.addEventListener('resize', () => { resizeCanvasAndGrid(); if(state==='game') draw(); });
        applySkin(equipped);
        updateUI();
        showScreen('menu');
        resizeCanvasAndGrid();
        gameSpeed = calcGameSpeed();
    })();
</script>
</body>
</html>
